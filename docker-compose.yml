services:
  app:
    build: .
    container_name: belo-app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: belo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - '5432:5432'
    volumes:
      - belo-postgres-data:/var/lib/postgresql/data

volumes:
  belo-postgres-data:
