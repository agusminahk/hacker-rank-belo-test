services:
  postgres:
    image: postgres:16-alpine
    container_name: belo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - '5432:5432'
    volumes:
      - belo-postgres-data:/var/lib/postgresql/data

volumes:
  belo-postgres-data:
